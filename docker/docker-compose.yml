version: "3"
services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../nginx-conf:/etc/nginx/conf.d
    depends_on:
      - php
  php:
    image: php:fpm-alpine
  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root123456
    volumes:
      - mysql-data:/var/lib/mysql
volumes:
  mysql-data:
