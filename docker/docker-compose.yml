version: "3"
services:
  nginx:
    image:nginx:alpine
    ports:
     - "8080:80"
    volumes:
     - ../nginx-conf:/etc/nginx/conf.d
    depends_on:
     - php
 php:
   images: php:fpm-alpine
 mysql:
   image:mysql:5.7
   environment:
      MYSQL_ROOT_PASSWD:root123456
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql-data:

