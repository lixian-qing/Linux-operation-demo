# Zabbix 触发器阈值速查 (对应 templates/linux_ops.xml, 可直接导入)
# 导入: Configuration - Templates - Import 选 linux_ops.xml
#
# key: system.cpu.util[all,avg,avg1]   CPU 使用率
#   > 90% 持续5min -> HIGH
#
# key: vm.memory.size[pavailable]      可用内存占比
#   < 15% 持续3min -> WARNING (即使用率 > 85%)
#
# key: vfs.fs.size[/,pused]            根分区使用率
#   > 85% -> WARNING
#   > 95% -> HIGH
#
# key: net.tcp.service[tcp,,80] / [tcp,,3306]
#   = 0 端口不可达 -> HIGH
#
# 告警动作(Action): 触发后发邮件/webhook, 未确认每10min重复, 恢复发恢复通知
#
# 配套 templates/linux_ops.xml 已含上述监控项+触发器, 导入即用
